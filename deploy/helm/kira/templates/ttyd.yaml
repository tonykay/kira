{{- if .Values.ttyd.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kira.fullname" . }}-ttyd
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kira.componentLabels" (dict "component" "ttyd" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kira.selectorLabels" (dict "component" "ttyd" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kira.componentLabels" (dict "component" "ttyd" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: ttyd
          image: "{{ .Values.ttyd.image.repository }}:{{ .Values.ttyd.image.tag }}"
          imagePullPolicy: {{ .Values.ttyd.image.pullPolicy }}
          ports:
            - containerPort: 7681
              protocol: TCP
            - containerPort: 7682
              protocol: TCP
            - containerPort: 7683
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "kira.fullname" . }}-secrets
          env:
            {{- if .Values.llm }}
            {{- if .Values.llm.baseUrl }}
            - name: ANTHROPIC_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.llm.apiKey }}
            - name: ANTHROPIC_API_KEY
              value: {{ .Values.llm.apiKey | quote }}
            {{- end }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: {{ include "kira.fullname" . }}-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ttyd
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kira.componentLabels" (dict "component" "ttyd" "root" .) | nindent 4 }}
spec:
  selector:
    {{- include "kira.selectorLabels" (dict "component" "ttyd" "root" .) | nindent 4 }}
  ports:
    - name: ttyd1
      port: 7681
      targetPort: 7681
      protocol: TCP
    - name: ttyd2
      port: 7682
      targetPort: 7682
      protocol: TCP
    - name: ttyd3
      port: 7683
      targetPort: 7683
      protocol: TCP
{{- end }}
