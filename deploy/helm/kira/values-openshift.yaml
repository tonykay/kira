# OpenShift-specific value overrides
# Usage: helm install kira deploy/helm/kira/ -f deploy/helm/kira/values-openshift.yaml

# Use ClusterIP instead of NodePort (OpenShift Routes handle external access)
frontend:
  service:
    type: ClusterIP

# Enable OpenShift Route for frontend
route:
  enabled: true
  # host: kira.apps.your-cluster.example.com  # Leave empty for auto-generated

